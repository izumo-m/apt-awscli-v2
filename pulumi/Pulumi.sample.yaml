config:
  aptAwscliV2:email: user@example.com               # Maintainer email address for APT packages
  aptAwscliV2:maintainerName: Your Name             # Maintainer name for APT packages
  aptAwscliV2:s3Uri: s3://your-apt-bucket/apt/      # S3 URI for APT repository hosting
  # aptAwscliV2:resourcePrefix: apt-awscli-v2        # Common prefix for all resource names (default: apt-awscli-v2)
  # aws:region: ap-northeast-1                      # Deploy region (defaults to SDK default from AWS_REGION etc.)
  # aptAwscliV2:accessLogsS3Uri: s3://your-apt-bucket-logs/  # S3 URI for access log delivery (disabled if omitted)
  # aptAwscliV2:accessLogRetentionDays: "-1"        # Access log retention days (-1 for indefinite)
  # aptAwscliV2:ssmParamName: /your-prefix/private.key  # SSM parameter name for GPG private key
  # aptAwscliV2:maxVersions: -1                     # Maximum number of versions to keep in pool (-1 for unlimited)
  # aptAwscliV2:aptArches:                          # APT build target architectures (amd64 / arm64)
  #   - amd64
  #   - arm64
  # aptAwscliV2:aptPackages:                        # Managed packages (aws-cli / session-manager-plugin)
  #   - aws-cli
  #   - session-manager-plugin
  # aptAwscliV2:lambdaArch: arm64                   # Lambda function architecture (x86_64 / arm64)
  # aptAwscliV2:lambdaMemorySize: "5120"            # Lambda memory size (MB)
  # aptAwscliV2:lambdaEphemeralStorage: "512"       # Lambda ephemeral storage (MB, 512-10240). Free up to 512MB
  # aptAwscliV2:lambdaTimeout: "900"                # Lambda timeout (seconds)
  # aptAwscliV2:lambdaThreads: "8"                  # S3 sync parallel thread count
  # aptAwscliV2:lambdaZstdThreads: "4"              # zstd compression thread count
  # aptAwscliV2:lambdaZstdLevel: "9"                # zstd compression level (1-22)
  # aptAwscliV2:scheduleCron: "cron(0 0 ? * TUE-SAT *)"  # Auto-execution schedule (default: JST 9:00 Tue-Sat, to pick up AWS releases from the previous US business day)
  # aptAwscliV2:logRetentionDays: "30"              # CloudWatch log retention days for Lambda
  # aptAwscliV2:enableScheduler: "true"             # Set to false to skip EventBridge Scheduler creation
  # aptAwscliV2:notificationEmail: alert@example.com  # Email notification on Lambda failure (creates SNS + CloudWatch Alarm)

  # ─── Cloudflare integration (opt-in) ─────────────────────────────────────
  # When cloudflareEnabled is true, Pulumi creates a Cloudflare Worker
  # (apt-awscli-v2-proxy) that fronts S3 and the Lambda invalidates the
  # corresponding edge cache after each S3 update.
  # Default is "false" — no Cloudflare resources are created.
  #
  # `pulumi up` requires the CLOUDFLARE_API_TOKEN env var when enabled.
  # See pulumi/README.md §Cloudflare Operations for required token permissions.
  #
  # aptAwscliV2:cloudflareEnabled: "true"
  # aptAwscliV2:cloudflareAccountId: "<cloudflare account id>"
  # aptAwscliV2:cloudflareZoneId:    "<cloudflare zone id>"
  # aptAwscliV2:cloudflareSsmParam:  /custom/path/cloudflare    # Optional. SSM SecureString holding {"api_token":"..."} for Lambda cache purge. Defaults to /<resourcePrefix>/cloudflare.
  # aptAwscliV2:cloudflareCustomDomain:   apt-awscli-v2.example.com  # Opt-in. Pulumi creates a WorkersCustomDomain when set.
  # aptAwscliV2:cloudflarePublicBaseUrl:  https://apt-awscli-v2.example.com  # Opt-in override. Defaults to https://${cloudflareCustomDomain}.
