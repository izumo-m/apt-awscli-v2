[env]
APT_AWSCLI_V2_LAMBDA_ARCH  = { value = "arm64",                        condition = { env_not_set = ["APT_AWSCLI_V2_LAMBDA_ARCH"] } }
APT_AWSCLI_V2_DOCKER_IMAGE = { value = "apt-awscli-v2-lambda-builder", condition = { env_not_set = ["APT_AWSCLI_V2_DOCKER_IMAGE"] } }
APT_AWSCLI_V2_LAMBDA_NAME  = { value = "apt-awscli-v2-lambda",         condition = { env_not_set = ["APT_AWSCLI_V2_LAMBDA_NAME"] } }
LAMBDA_ARCH      = "${APT_AWSCLI_V2_LAMBDA_ARCH}"
DOCKER_IMAGE     = "${APT_AWSCLI_V2_DOCKER_IMAGE}"
LAMBDA_NAME      = "${APT_AWSCLI_V2_LAMBDA_NAME}"
CARGO_LAMBDA_DIR = "target/${LAMBDA_ARCH}/lambda/apt-awscli-v2-lambda"
LAMBDA_DIR       = "target/${LAMBDA_ARCH}/dist"
MUSL_TARGET      = { script = ["if [ \"${LAMBDA_ARCH}\" = \"arm64\" ]; then echo aarch64-unknown-linux-musl; else echo x86_64-unknown-linux-musl; fi"] }

[tasks.docker-image]
description = "Build Docker image for cross-compilation"
script = '''
MUSL_TAG=$(echo "$MUSL_TARGET" | sed 's/-unknown-linux//')
docker build --build-arg MUSL_TAG=$MUSL_TAG -t "$DOCKER_IMAGE-$LAMBDA_ARCH" .
'''

[tasks.build]
clear = true
description = "Build Lambda binary (Docker cross-compile)"
dependencies = ["docker-image"]
script = '''
mkdir -p "$LAMBDA_DIR" target/cargo-registry
docker run --rm \
  --user "$(id -u):$(id -g)" \
  -v "$(pwd)/..:/repo" -w /repo/lambda \
  -v "$(pwd)/target/cargo-registry:/cargo-registry" \
  -e "CARGO_HOME=/cargo-registry" \
  -e "CARGO_TARGET_DIR=target/$LAMBDA_ARCH" \
  "$DOCKER_IMAGE-$LAMBDA_ARCH" \
  cargo lambda build --release --compiler cargo --target $MUSL_TARGET
cp "$CARGO_LAMBDA_DIR/bootstrap" "$LAMBDA_DIR/bootstrap"
zip -jq "$LAMBDA_DIR/bootstrap.zip" "$LAMBDA_DIR/bootstrap"
if [ -n "${APT_AWSCLI_V2_OUTPUT_ZIP:-}" ]; then
  mkdir -p "$(dirname "$APT_AWSCLI_V2_OUTPUT_ZIP")"
  cp "$LAMBDA_DIR/bootstrap.zip" "$APT_AWSCLI_V2_OUTPUT_ZIP"
  echo "build: created $APT_AWSCLI_V2_OUTPUT_ZIP"
fi
'''

[tasks.build-local]
description = "Build Lambda binary (local toolchain)"
env = { "CARGO_LAMBDA_DIR" = "target/local/lambda/apt-awscli-v2-lambda", "LAMBDA_DIR" = "target/local/dist" }
script = '''
cargo lambda build --release --compiler cargo --target $MUSL_TARGET
mkdir -p "$LAMBDA_DIR"
cp "$CARGO_LAMBDA_DIR/bootstrap" "$LAMBDA_DIR/bootstrap"
zip -jq "$LAMBDA_DIR/bootstrap.zip" "$LAMBDA_DIR/bootstrap"
if [ -n "${APT_AWSCLI_V2_OUTPUT_ZIP:-}" ]; then
  mkdir -p "$(dirname "$APT_AWSCLI_V2_OUTPUT_ZIP")"
  cp "$LAMBDA_DIR/bootstrap.zip" "$APT_AWSCLI_V2_OUTPUT_ZIP"
  echo "build: created $APT_AWSCLI_V2_OUTPUT_ZIP"
fi
'''

[tasks.clean-package]
description = "Clean only the lambda crate (keep dependencies cached)"
dependencies = ["docker-image"]
script = '''
docker run --rm \
  --user "$(id -u):$(id -g)" \
  -v "$(pwd)/..:/repo" -w /repo/lambda \
  -v "$(pwd)/target/cargo-registry:/cargo-registry" \
  -e "CARGO_HOME=/cargo-registry" \
  -e "CARGO_TARGET_DIR=target/$LAMBDA_ARCH" \
  "$DOCKER_IMAGE-$LAMBDA_ARCH" \
  cargo clean -p apt-awscli-v2-lambda --target $MUSL_TARGET --release
'''

[tasks.clean]
clear = true
description = "Remove cargo registry cache and build artifacts"
script = '''
rm -rf target/arm64 target/x86_64 target/local target/cargo-registry
'''
